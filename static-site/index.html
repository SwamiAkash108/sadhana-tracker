<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FDFCF9">
<meta name="description" content="Sadhana Tracker — track your daily spiritual practices">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<title>Sadhana Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FDFCF9;--linen:#F0EDE6;--khaki:#E8E4DB;--sand:#DDD9D0;
  --stone:#C5C0B6;--walnut:#8A8478;--bark:#6B665D;--espresso:#4A4640;
  --ink:#2C2A25;--deepink:#1A1814;--forest:#16A34A;--amber:#D97706;--brick:#DC2626
}
body{
  font-family:'Inter',sans-serif;color:var(--ink);line-height:1.6;background:var(--cream);
  background-image:radial-gradient(rgba(30,25,18,0.06) 1px,transparent 1px);background-size:24px 24px
}
.card{
  background:var(--cream);border:1px solid var(--sand);border-radius:10px;
  box-shadow:0 1px 3px rgba(30,25,18,0.08),inset 0 1px 0 rgba(255,255,255,0.5);padding:20px
}
.card:hover{box-shadow:0 2px 8px rgba(30,25,18,0.08)}
h1,h2,h3{font-family:'Lora',serif;color:var(--deepink)}
.btn{
  display:inline-flex;align-items:center;gap:6px;font-family:'Inter',sans-serif;
  font-size:12px;font-weight:500;padding:8px 16px;border-radius:7px;border:none;
  cursor:pointer;transition:all 0.2s
}
.btn-primary{background:var(--deepink);color:var(--cream);box-shadow:0 1px 3px rgba(30,25,18,0.08)}
.btn-primary:hover{background:var(--ink)}
.btn-ghost{background:transparent;color:var(--bark)}
.btn-ghost:hover{background:var(--linen);color:var(--ink)}
.btn-secondary{background:var(--cream);color:var(--ink);border:1px solid var(--sand)}
.btn-secondary:hover{background:var(--linen)}
.input{
  width:100%;background:var(--cream);border:1px solid var(--sand);border-radius:8px;
  padding:10px 12px;font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);
  transition:border-color 0.2s
}
.input:focus{outline:none;border-color:var(--ink);box-shadow:0 1px 3px rgba(30,25,18,0.08)}
.input::placeholder{color:var(--stone)}
.progress-bar{height:6px;border-radius:3px;background:var(--linen);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width 0.5s ease;background:var(--ink)}
.progress-fill.done{background:var(--forest)}
.badge{display:inline-flex;align-items:center;gap:4px;background:var(--linen);
  border:1px solid var(--sand);border-radius:4px;padding:2px 8px;font-size:10px;
  font-weight:500;color:var(--bark)}
.tab{flex:1;text-align:center;padding:8px 0;font-size:12px;font-weight:500;
  border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--walnut);
  transition:all 0.2s;font-family:'Inter',sans-serif}
.tab.active{background:var(--deepink);color:var(--cream);box-shadow:0 1px 3px rgba(30,25,18,0.1)}
.tab:hover:not(.active){background:var(--khaki);color:var(--ink)}
.nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(253,252,249,0.9);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--sand)}
.check-item{
  width:100%;display:flex;align-items:center;gap:14px;padding:14px 0;
  border:none;background:transparent;cursor:pointer;text-align:left;
  font-family:'Inter',sans-serif;transition:opacity 0.2s
}
.check-item:not(:last-child){border-bottom:1px solid rgba(221,217,208,0.5)}
.check-item:hover{background:rgba(240,237,230,0.4)}
.check-item.done{opacity:0.55}
.check-circle{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--stone);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s
}
.check-item.done .check-circle{background:var(--forest);border-color:var(--forest)}
.check-icon{display:none;width:12px;height:12px;color:var(--cream)}
.check-item.done .check-icon{display:block}
.check-text{flex:1;min-width:0}
.check-name{font-size:14px;font-weight:500;color:var(--ink);display:flex;align-items:center;gap:8px}
.check-item.done .check-name{color:var(--walnut);text-decoration:line-through}
.check-desc{font-size:11px;color:var(--walnut);margin-top:2px}
.heatmap-cell{border-radius:2px;aspect-ratio:1;transition:transform 0.15s}
.heatmap-cell:hover{transform:scale(1.15)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes checkPop{0%{transform:scale(0.6);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.animate-in{animation:fadeIn 0.3s ease-out both}
.animate-pop{animation:checkPop 0.3s cubic-bezier(0.34,1.56,0.64,1)}
</style>
</head>
