services:
  - type: web
    name: sadhana-tracker
    env: node
    repo: https://github.com/SwamiAkash108/sadhana-tracker
    plan: free
    buildCommand: cd server && npm install && cd ../client && npm install && npx vite build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: VAPID_SUBJECT
        value: mailto:akashananda@bhaktimarga.org
      - key: JWT_SECRET
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
